<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RESONANT Agent</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">R</div>
        <div>
          <h1>RESONANT Agent</h1>
          <p id="status">Starting...</p>
        </div>
      </div>
      <button id="newChat" type="button">New Chat</button>
      <div class="session-list">
        <div class="session active">Current conversation</div>
      </div>
    </aside>

    <main class="chat">
      <section id="messages" class="messages" aria-live="polite"></section>
      <form id="composer" class="composer">
        <textarea id="input" rows="1" placeholder="Talk to your agent..." autofocus></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
