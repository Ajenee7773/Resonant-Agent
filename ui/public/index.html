<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RESONANT Agent</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">R</div>
        <div>
          <h1>RESONANT Agent</h1>
          <p id="status">Starting...</p>
        </div>
      </div>
      <button id="newChat" type="button">New Chat</button>
      <section class="heartbeat-card" aria-label="Heartbeat status">
        <div class="heartbeat-head">
          <div class="heartbeat-title">
            <span id="heartbeatDot" class="heartbeat-dot waiting" aria-hidden="true"></span>
            <span>Heartbeat</span>
          </div>
          <span id="heartbeatState" class="heartbeat-state">Checking...</span>
        </div>
        <p id="heartbeatMeta">Loading heartbeat...</p>
        <p id="heartbeatLast" class="heartbeat-last"></p>
        <div class="heartbeat-actions">
          <button id="heartbeatStart" type="button">Start</button>
          <button id="heartbeatToggle" type="button">Pause</button>
          <button id="heartbeatOnce" type="button">Run Once</button>
          <button id="heartbeatDryRun" type="button">Dry Run</button>
        </div>
        <pre id="heartbeatOutput" class="heartbeat-output" hidden></pre>
      </section>
      <div class="session-list">
        <div class="session active">Current conversation</div>
      </div>
    </aside>

    <main class="chat">
      <section id="messages" class="messages" aria-live="polite"></section>
      <form id="composer" class="composer">
        <button id="voiceInput" class="icon-button" type="button" aria-label="Voice input" title="Voice input">Mic</button>
        <textarea id="input" rows="1" placeholder="Talk to your agent..." autofocus></textarea>
        <button id="speakToggle" class="icon-button" type="button" aria-label="Read replies aloud" title="Read replies aloud">Voice</button>
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
